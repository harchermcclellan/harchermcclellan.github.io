<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name=viewport content="width=device-width, initial-scale=1">
  <meta name="author" content="Haley Archer-McClellan">
  <meta name="description" content="{{ site.description }}">

  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:type" content="{% if page.url == '/' %}website{% else %}article{% endif %}">
  <meta property="og:site_name" content="{{ site.name }}">
  

  {%- if page.og_image %}
  {% assign og_image = page.og_image %}
  {% else %}
  {% assign og_image = "word-cloud.png" %}
  {% endif %}

  <meta property="og:image" content="https://s3.amazonaws.com/nithinbekal.com/og/{{og_image}}" />
<link rel="stylesheet" href="{{ '/css/blog-custom.css' | relative_url }}">

  <title>{{ page.title }}</title>

  <link rel="icon" href="/images/favicon.svg" type="image/x-icon" />


  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.url }}/feed.xml">
  <link rel="canonical" href="{{ site.url }}{{ page.url | replace:'index.html',''}}">
<link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/css/syntax.css' | relative_url }}">
  {%- if page.balloon_css -%}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/balloon-css/1.2.0/balloon.min.css">
  {%- endif -%}

  {% include analytics.html %}
</head>

<body>
  <div class='container'>
    <div class='header'>
      <span class='site-title'><a href='/'>{{ site.name }}</a></span>
      <span class='links align-right'>

      </span>
    </div>

    <main class='site'>
      {{ content }}
    </main>

    <div class='footer'>
      Powered by <a href='http://jekyllrb.com'>Jekyll</a>.
      <a href="https://github.com/nithinbekal/nithinbekal.github.io/">Theme built by Nithin Bekal</a>.
    </div>
  </div> <!-- /container -->
  
</body>

</html>
