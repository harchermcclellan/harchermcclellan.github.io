name: Deploy Jekyll Blog

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ./blog
          bundler-cache: true

      - name: Build Jekyll
        working-directory: ./blog
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Copy main site into _site
        run: |
          cp index.html blog/_site/index.html.bak  # don't overwrite blog's index
          cp index.html blog/_site/home.html
          cp experience.html blog/_site/experience.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
