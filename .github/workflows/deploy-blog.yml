name: Deploy Site

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: ./blog
          bundler-cache: true

      - name: Build Jekyll
        working-directory: ./blog
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Assemble full site
        run: |
          mkdir -p _deploy/blog
          cp -r blog/_site/. _deploy/blog/
          cp index.html _deploy/index.html
          cp experience.html _deploy/experience.html
          cp projects.html _deploy/projects.html
          cp -r assets _deploy/assets

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
